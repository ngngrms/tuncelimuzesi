<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tunceli Müzesi</title>
  <style>
    /* Arka plan gradient animasyonu */
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(-45deg, #f9f9f9, #d0e6f9, #f9f9f9, #cce7ff);
      background-size: 400% 400%;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      animation: gradientBG 15s ease infinite;
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    /* Başlık animasyonu */
    h1 {
      margin-top: 50px;
      color: #2c3e50;
      font-size: 3em;
      opacity: 0;
      transform: translateY(-50px);
      animation: fadeInDown 1.2s forwards 0.5s;
    }

    @keyframes fadeInDown {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Buton animasyonu */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin: 30px 0;
      opacity: 0;
      transform: translateY(50px);
      animation: fadeInUp 1s forwards 1.2s;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Buton tasarımı */
    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #3498db;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { background-color: #2980b9; }

    /* İçerik kutusu */
    .content {
      width: 90%;
      max-width: 900px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      display: none;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
      margin-bottom: 30px;
    }

    .content.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    /* Fotoğraf galerisi */
    .gallery {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px 0;
    }

    .gallery img {
      height: 200px;
      border-radius: 8px;
      transition: transform 0.3s;
      cursor: pointer;
    }

    .gallery img:hover { transform: scale(1.05); }

    /* Video modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 10;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      position: relative;
      width: 80%;
      max-width: 800px;
    }

    .modal-content iframe {
      width: 100%;
      height: 450px;
      border-radius: 10px;
      border: none;
    }

    .close {
      position: absolute;
      top: -15px;
      right: -15px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 18px;
      width: 35px;
      height: 35px;
      cursor: pointer;
    }

    iframe.map {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 10px;
    }

    /* Mobil uyum */
    @media (max-width: 600px) {
      h1 { font-size: 2em; }
      button { padding: 10px 18px; font-size: 14px; }
      .gallery img { height: 150px; }
    }
  </style>
</head>
<body>

  <h1>Tunceli Müzesi</h1>

  <div class="buttons">
    <button onclick="showContent('info')">Müze Hakkında</button>
    <button onclick="showVideo('dQw4w9WgXcQ')">Tanıtım Videosu</button>
    <button onclick="showContent('photos')">Fotoğraflar</button>
    <button onclick="showContent('location')">Konum</button>
  </div>

  <!-- Müze Hakkında -->
  <div id="info" class="content">
    <h2>Müze Hakkında</h2>
    <p>Tunceli Müzesi, bölgenin kültürel ve tarihi mirasını sergileyen bir müzedir. Zengin arkeolojik ve etnografik koleksiyonları ile ziyaretçilere bölge tarihini sunar.</p>
  </div>

  <!-- Fotoğraf Galerisi -->
  <div id="photos" class="content">
    <h2>Fotoğraflar</h2>
    <div class="gallery">
      <img src="tunceli_muze1.jpg" alt="Tunceli Müzesi 1">
      <img src="tunceli_muze2.jpg" alt="Tunceli Müzesi 2">
      <img src="tunceli_muze3.jpg" alt="Tunceli Müzesi 3">
      <img src="tunceli_muze4.jpg" alt="Tunceli Müzesi 4">
      <img src="tunceli_muze5.jpg" alt="Tunceli Müzesi 5">
    </div>
  </div>

  <!-- Konum -->
  <div id="location" class="content">
    <h2>Konum</h2>
    <iframe class="map" src="https://www.google.com/maps?q=39.104525,39.548306&hl=tr&z=15&output=embed" allowfullscreen></iframe>
  </div>

  <!-- Video Modal -->
  <div id="videoModal" class="modal">
    <div class="modal-content">
      <button class="close" onclick="closeVideo()">&times;</button>
      <iframe id="videoFrame" src="" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    // İçerik gösterme
    function showContent(id) {
      const contents = document.querySelectorAll('.content');
      contents.forEach(c => c.classList.remove('show'));
      document.getElementById(id).classList.add('show');
    }

    // Video modal açma
    function showVideo(videoId) {
      const modal = document.getElementById('videoModal');
      const frame = document.getElementById('videoFrame');
      frame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
      modal.style.display = 'flex';
    }

    // Video modal kapatma
    function closeVideo() {
      const modal = document.getElementById('videoModal');
      const frame = document.getElementById('videoFrame');
      frame.src = '';
      modal.style.display = 'none';
    }

    // Modal dışında tıklayınca kapatma
    window.onclick = function(e) {
      const modal = document.getElementById('videoModal');
      if (e.target == modal) closeVideo();
    }
  </script>

</body>
</html>
