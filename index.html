<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tunceli Müzesi - İnteraktif Deneyim</title>

  <style>
    :root {
      --primary-blue: #3498db;
      --accent-purple: #9b59b6;
      --deep-bg: #0a0e12;
      --glass: rgba(255, 255, 255, 0.05);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at center, #1e272e 0%, var(--deep-bg) 100%);
      margin: 0;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      background-attachment: fixed;
    }

    /* Arka plan süslemesi */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.15;
      pointer-events: none;
      z-index: -1;
    }

    /* Ana Menü */
    .menu-container {
      position: relative;
      width: 500px;
      height: 500px;
      margin-top: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .menu-hidden {
      opacity: 0;
      transform: scale(0.8) rotate(-10deg);
      pointer-events: none;
      display: none;
    }

    .center-circle {
      z-index: 10;
      text-align: center;
      background: var(--glass);
      backdrop-filter: blur(15px);
      border-radius: 50%;
      width: 180px;
      height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: 2px solid var(--primary-blue);
      box-shadow: 0 0 40px rgba(52, 152, 219, 0.3);
      animation: pulse 4s infinite ease-in-out;
    }

    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    /* Butonlar */
    .nav-btn {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(41, 128, 185, 0.7);
      color: white;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(5px);
    }

    .nav-btn span { font-size: 24px; margin-bottom: 5px; }
    .nav-btn:hover {
      transform: scale(1.15);
      background: var(--primary-blue);
      box-shadow: 0 0 30px var(--primary-blue);
    }

    /* Buton Pozisyonları */
    .btn-info { top: 0; left: 195px; }
    .btn-video { top: 150px; right: 20px; }
    .btn-photos { bottom: 30px; right: 100px; }
    .btn-tour { bottom: 30px; left: 100px; background: rgba(142, 68, 173, 0.8) !important; }
    .btn-location { top: 150px; left: 20px; }

    /* İçerik Panelleri */
    .content {
      width: 90%;
      max-width: 900px;
      background: rgba(15, 20, 25, 0.98);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 30px;
      margin-top: 40px;
      display: none;
      box-shadow: 0 30px 100px rgba(0,0,0,0.8);
      border-top: 4px solid var(--primary-blue);
      margin-bottom: 50px;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .back-btn {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: 0.3s;
    }
    .back-btn:hover { background: #e74c3c; }

    /* Galeri */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    .gallery img { width: 100%; height: 160px; object-fit: cover; border-radius: 15px; cursor: pointer; transition: 0.3s; }
    .gallery img:hover { transform: scale(1.05); }

    /* MODAL (Tam Ekran Katmanı) */
    .fullscreen-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #000;
      z-index: 2000;
    }

    .modal-close {
      position: absolute;
      top: 20px; right: 30px;
      color: white;
      font-size: 40px;
      cursor: pointer;
      z-index: 2100;
      text-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    iframe { width: 100%; height: 100%; border: none; }

    @media (max-width: 600px) { .menu-container { transform: scale(0.65); } }
  </style>
</head>

<body>

  <div class="menu-container" id="mainMenu">
    <div class="center-circle">
      <h1 style="font-size: 1em; letter-spacing: 2px; margin: 0;">TUNCELİ</h1>
      <h2 style="color: var(--primary-blue); font-size: 1.2em; margin: 0;">MÜZESİ</h2>
    </div>
    
    <div class="buttons">
      <button class="nav-btn btn-info" onclick="showContent('info')"><span>🏛️</span>BİLGİ</button>
      <button class="nav-btn btn-video" onclick="showVideo('e0ZjN82BlqI')"><span>🎥</span>VİDEO</button>
      <button class="nav-btn btn-photos" onclick="showContent('photos')"><span>🖼️</span>GALERİ</button>
      <button class="nav-btn btn-tour" onclick="openFullscreenTour()"><span>🌐</span>TUR</button>
      <button class="nav-btn btn-location" onclick="showContent('location')"><span>📍</span>KONUM</button>
    </div>
  </div>

  <div id="info" class="content">
    <button class="back-btn" onclick="returnToMenu()">← ANA MENÜ</button>
    <h2 style="color: var(--primary-blue);">Müze Hakkında</h2>
    <p style="line-height: 1.8; color: #ccc;">Tunceli Müzesi, 1935 yılında inşa edilen tarihi kışla binasında yer almaktadır. 2020 yılında ziyarete açılan müze, bölgenin arkeolojik, etnografik ve inançsal değerlerini modern bir teşhir anlayışıyla sunar.</p>
  </div>

  <div id="photos" class="content">
    <button class="back-btn" onclick="returnToMenu()">← ANA MENÜ</button>
    <h2 style="color: var(--primary-blue);">Fotoğraflar</h2>
    <div class="gallery">
      <img src="tunceli_muze1.jpg" onclick="showImageModal(this.src)">
      <img src="tunceli_muze2.jpg" onclick="showImageModal(this.src)">
      <img src="tunceli_muze3.jpg" onclick="showImageModal(this.src)">
      <img src="tunceli_muze4.jpg" onclick="showImageModal(this.src)">
    </div>
  </div>

  <div id="location" class="content">
    <button class="back-btn" onclick="returnToMenu()">← ANA MENÜ</button>
    <div style="height: 450px; border-radius: 20px; overflow: hidden; border: 1px solid var(--primary-blue);">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3106.666!2d39.548!3d39.108!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMznCsDA2JzI4LjgiTiAzOcKwMzInNTIuOCJF!5e0!3m2!1str!2str!4v1" allowfullscreen="" loading="lazy"></iframe>
    </div>
  </div>

  <div id="fullscreenModal" class="fullscreen-modal">
    <span class="modal-close" onclick="closeFullscreenModal()">×</span>
    <div id="modalBody" style="width: 100%; height: 100%;"></div>
  </div>

<script>
  // Bölümleri göster
  function showContent(id) {
    document.getElementById('mainMenu').classList.add('menu-hidden');
    document.querySelectorAll('.content').forEach(c => c.classList.remove('show'));
    document.getElementById(id).style.display = 'block';
    setTimeout(() => document.getElementById(id).classList.add('show'), 10);
  }

  // Menüye dön
  function returnToMenu() {
    document.querySelectorAll('.content').forEach(c => {
        c.classList.remove('show');
        setTimeout(() => c.style.display = 'none', 500);
    });
    document.getElementById('mainMenu').classList.remove('menu-hidden');
  }

  // TAM EKRAN SANAL TUR AÇ (Modal Yöntemi)
  function openFullscreenTour() {
    const modal = document.getElementById('fullscreenModal');
    const body = document.getElementById('modalBody');
    const url = "https://artsandculture.google.com/story/tunceli-m%C3%BCzesi-nde-tarih-ve-k%C3%BClt%C3%BCr-yolculu%C4%9Fu-the-directorate-general-of-cultural-assets-and-museums-of-t%C3%BCrkiye/-wUR7IUphvq71Q?hl=tr";
    
    body.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden'; // Kaydırmayı engelle
  }

  // TAM EKRAN VİDEO AÇ
  function showVideo(videoId) {
    const modal = document.getElementById('fullscreenModal');
    const body = document.getElementById('modalBody');
    body.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    modal.style.display = 'block';
  }

  // RESİM MODALI
  function showImageModal(src) {
    const modal = document.getElementById('fullscreenModal');
    const body = document.getElementById('modalBody');
    body.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%;"><img src="${src}" style="max-width:90%; max-height:90%; border-radius:10px; box-shadow:0 0 30px white;"></div>`;
    modal.style.display = 'block';
  }

  // MODALI KAPAT
  function closeFullscreenModal() {
    const modal = document.getElementById('fullscreenModal');
    const body = document.getElementById('modalBody');
    body.innerHTML = ""; // İçeriği temizle (videoyu durdurur)
    modal.style.display = 'none';
    document.body.style.overflow = 'auto'; // Kaydırmayı geri aç
  }

  // ESC ile kapatma
  document.addEventListener('keydown', (e) => {
    if (e.key === "Escape") closeFullscreenModal();
  });
</script>

</body>
</html>
